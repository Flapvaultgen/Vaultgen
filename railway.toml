# Deploy from repo root. Railway runs the AI/codegen API (needs Foundry + full Solidity tree).
[build]
builder = "NIXPACKS"
buildCommand = "curl -L https://foundry.paradigm.xyz | bash && export PATH=\"$HOME/.foundry/bin:$PATH\" && foundryup && cd server && npm ci"

[deploy]
startCommand = "cd server && npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
